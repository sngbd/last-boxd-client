<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Last Boxd</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
  <script src="./script.js"></script>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="container" class="container h-100 justify-content-between d-flex">
    <div class="row align-items-center d-flex">
      <div class="col-lg-12">
        <h1 class="mb-4"><b>Letterboxd</b> collage generator</h1>
        <form action="javascript:getChart()">
          <div class="mb-2">
            <input class="form-control" style="width: 200px; display: inline-block;" id="user" type="text" placeholder="Letterboxd username" required>
            <select class="form-control" style="width: 60px; display: inline-block;" id="grid">
              <option value="2">2x2</option>
              <option selected value="3">3x3</option>
              <option value="4">4x4</option>
              <option value="5">5x5</option>
              <option value="6">6x6</option>
              <option value="7">7x7</option>
            </select>
          </div>
          <input class="btn btn-primary my-2" type="submit" value="Submit">
          <div>
            <ul>
              <li>Display details (title, director, rating)? <input id="details" type="checkbox" checked></li>
            </ul>
          </div>
          <small>This product uses the <a href="https://themoviedb.org/">TMDB</a> API but is not endorsed or certified by <a href="https://themoviedb.org/">TMDB</a>.</small>
        </form>
      </div>
    </div>
    <div class="row align-items-center d-flex">
      <div class="col-lg-12">
        <h4 id="loading" hidden></h4>
        <img id="chart" hidden src="" alt="chart" width="500">
        <div class="square">
        </div>
      </div>
    </div>
  </div>
</body>
</html>
